# Promtail configuration - collect Docker container logs
# Sends logs to Loki for aggregation

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: containers
    entry_parser: raw
    static_configs:
      - targets:
          - localhost
        labels:
          job: containerlogs
        __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      # Parse Docker JSON log format (stream, log, attrs)
      - json:
          expressions:
            stream: stream
            log: log
            attrs: attrs
      # Output the log line
      - output:
          source: log
