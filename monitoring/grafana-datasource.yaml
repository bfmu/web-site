# Grafana datasource provisioning - Loki
# Place in /etc/grafana/provisioning/datasources/

apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki
    access: proxy
    url: http://loki:3100
    isDefault: true
    editable: false
    jsonData:
      timeout: 120
      maxLines: 1000
