# Provisioning de dashboards - se cargan automáticamente en Grafana
apiVersion: 1

providers:
  - name: 'default'
    orgId: 1
    folder: 'Logs'
    folderUid: 'logs'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards/json
