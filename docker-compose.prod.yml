version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: website-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    networks:
      - internal
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: website-backend
    restart: unless-stopped
    expose:
      - 3000
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/blog?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      # OAuth y Spotify configurables desde dashboard, pero con fallback opcional:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITHUB_CALLBACK_URL=${GITHUB_CALLBACK_URL:-}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID:-}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET:-}
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI:-}
      - SPOTIFY_REFRESH_TOKEN=${SPOTIFY_REFRESH_TOKEN:-}
      - FRONTEND_ADMIN_URL=${FRONTEND_ADMIN_URL:-}
    volumes:
      - ./backend/uploads:/usr/src/app/uploads
    networks:
      - internal
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - PUBLIC_WEB_SITE_URL=${PUBLIC_WEB_SITE_URL}
        - PUBLIC_BACKEND_URL=${PUBLIC_BACKEND_URL}
    container_name: website-frontend
    restart: unless-stopped
    expose:
      - 4321
    environment:
      - PUBLIC_WEB_SITE_URL=${PUBLIC_WEB_SITE_URL}
      - PUBLIC_BACKEND_URL=${PUBLIC_BACKEND_URL}
    networks:
      - internal
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: website-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # Certificados SSL
      - ./nginx-logs:/var/log/nginx
    networks:
      - internal
      - proxy  # Red externa si usas Traefik/otro proxy
    depends_on:
      - frontend
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data:
    driver: local

networks:
  internal:
    driver: bridge
  proxy:
    external: true  # Si usas Traefik u otro proxy externo, cambia a false si no lo usas
