version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: website-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
    networks:
      - internal
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: website-backend
    restart: unless-stopped
    expose:
      - 3000
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://${MONGO_USERNAME}:${MONGO_PASSWORD}@mongodb:27017/blog?authSource=admin
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      # OAuth y Spotify configurables desde dashboard, pero con fallback opcional:
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - GITHUB_CALLBACK_URL=${GITHUB_CALLBACK_URL:-}
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID:-}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET:-}
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI:-}
      - SPOTIFY_REFRESH_TOKEN=${SPOTIFY_REFRESH_TOKEN:-}
      - FRONTEND_ADMIN_URL=${FRONTEND_ADMIN_URL:-}
    volumes:
      - ./backend/uploads:/usr/src/app/uploads
    networks:
      - internal
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - PUBLIC_WEB_SITE_URL=${PUBLIC_WEB_SITE_URL}
        - PUBLIC_BACKEND_URL=${PUBLIC_BACKEND_URL}
        - PUBLIC_GRAFANA_URL=${GRAFANA_PUBLIC_URL:-}
    container_name: website-frontend
    restart: unless-stopped
    expose:
      - 4321
    environment:
      - PUBLIC_WEB_SITE_URL=${PUBLIC_WEB_SITE_URL}
      - PUBLIC_BACKEND_URL=${PUBLIC_BACKEND_URL}
      - PUBLIC_GRAFANA_URL=${GRAFANA_PUBLIC_URL:-}
    networks:
      - internal
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: website-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro  # Certificados SSL
      - ./nginx-logs:/var/log/nginx
    networks:
      - internal
      - proxy  # Red externa si usas Traefik/otro proxy
    depends_on:
      - frontend
      - backend
      - grafana
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Logging stack: Loki, Promtail, Grafana
  loki:
    image: grafana/loki:3.6.0
    container_name: website-loki
    restart: unless-stopped
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/config.yaml
    networks:
      - internal

  promtail:
    image: grafana/promtail:2.9.4
    container_name: website-promtail
    restart: unless-stopped
    volumes:
      - ./monitoring/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    networks:
      - internal

  grafana:
    image: grafana/grafana:latest
    container_name: website-grafana
    restart: unless-stopped
    expose:
      - 3000
    environment:
      # Grafana en subpath bfmu.dev/grafana (o GRAFANA_PUBLIC_URL para subdominio)
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-${PUBLIC_WEB_SITE_URL:-https://bfmu.dev}/grafana/}
      - GF_SERVER_SERVE_FROM_SUB_PATH=${GRAFANA_SERVE_FROM_SUBPATH:-true}
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana-datasource.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    depends_on:
      - loki
    networks:
      - internal
      - proxy  # Para que NPM pueda conectarse directo (grafana.bfmu.dev -> website-grafana:3000)

volumes:
  mongodb_data:
    driver: local
  loki_data:
    driver: local

networks:
  internal:
    driver: bridge
  proxy:
    external: true  # Si usas Traefik u otro proxy externo, cambia a false si no lo usas
