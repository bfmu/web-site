# ====================
# Configuración Nginx para Angular Admin Panel
# ====================

server {
    listen 80;
    listen [::]:80;
    server_name _;
    
    # Configuración de seguridad
    server_tokens off;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy strict-origin-when-cross-origin;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.bfmu.dev https://localhost:82";
    
    # Root y index
    root /usr/share/nginx/html;
    index index.html index.htm;
    
    # Compresión gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/xml+rss
        application/json
        application/xml
        text/html;
    
    # Cache para assets estáticos (JS, CSS, fuentes, imágenes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }
    
    # Cache para manifest y service worker (corto)
    location ~* \.(manifest|sw)\.js$ {
        expires 1h;
        add_header Cache-Control "public, no-cache";
        try_files $uri =404;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # API proxy (opcional, para desarrollo)
    location /api/ {
        # Descomentar para desarrollo local
        # proxy_pass http://host.docker.internal:82/api/;
        
        # Para producción, redirigir al cliente
        return 404;
    }
    
    # Configuración para Angular Router (SPA)
    # IMPORTANTE: Este debe ser el último location
    location / {
        try_files $uri $uri/ /index.html;
        
        # Headers para el index.html (no cache)
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
    # Error pages personalizadas
    error_page 404 /index.html;
    error_page 500 502 503 504 @fallback;
    
    location @fallback {
        root /usr/share/nginx/html;
        try_files /index.html =500;
    }
}

