server {
    listen 80;
    server_name localhost;

    # Health check para Docker
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Proxy para /api al backend
    location /api/ {
        proxy_pass http://website-backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy para /uploads (imágenes y medios del backend)
    location /uploads/ {
        proxy_pass http://website-backend:3000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy para frontend (Astro escucha en 4321)
    location / {
        proxy_pass http://website-frontend:4321;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Cache para estáticos del frontend
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp)$ {
        proxy_pass http://website-frontend:4321;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
