# Requerido para WebSockets de Grafana Live (frontend Astro y Grafana)
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# Resolver DNS de Docker para resolver upstreams en tiempo de petición (evita fallo si Grafana está reiniciando)
resolver 127.0.0.11 valid=10s ipv6=off;

# X-Forwarded-Proto desde proxy (NPM) para evitar redirect loop
map $http_x_forwarded_proto $grafana_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

# grafana.bfmu.dev lo maneja NPM directamente -> website-grafana:3000 (ver instrucciones abajo)
# No definimos server para grafana.bfmu.dev aquí; NPM hace proxy directo al contenedor

server {
    listen 80;
    server_name localhost bfmu.dev www.bfmu.dev;

    # Permitir uploads de hasta 100MB (imágenes para álbumes)
    client_max_body_size 100m;

    # Health check para Docker
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Proxy para /api al backend
    location /api/ {
        proxy_pass http://website-backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Redirigir bfmu.dev/grafana -> grafana.bfmu.dev (Grafana se sirve por subdominio vía NPM)
    location ~ ^/grafana/?(.*)$ {
        return 302 $grafana_forwarded_proto://grafana.bfmu.dev/$1;
    }

    # Proxy para /uploads (imágenes y medios del backend)
    # ^~ evita que la regex de estáticos capture /uploads/*.jpg|png| etc.
    location ^~ /uploads/ {
        proxy_pass http://website-backend:3000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Proxy para frontend (Astro escucha en 4321)
    location / {
        proxy_pass http://website-frontend:4321;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Cache para estáticos del frontend
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp)$ {
        proxy_pass http://website-frontend:4321;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
