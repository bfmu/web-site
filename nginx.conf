# Requerido para WebSockets de Grafana Live (frontend Astro y Grafana)
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# X-Forwarded-Proto desde proxy (NPM) para evitar redirect loop
map $http_x_forwarded_proto $grafana_forwarded_proto {
    default $http_x_forwarded_proto;
    ''      $scheme;
}

# Redirigir grafana.bfmu.dev -> bfmu.dev/grafana (Grafana se sirve solo por subpath)
server {
    listen 80;
    server_name grafana.bfmu.dev;
    return 302 $grafana_forwarded_proto://bfmu.dev/grafana/;
}

server {
    listen 80;
    server_name localhost bfmu.dev www.bfmu.dev;

    # Permitir uploads de hasta 10MB (imágenes para álbumes)
    client_max_body_size 10m;

    # Health check para Docker
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    # Proxy para /api al backend
    location /api/ {
        proxy_pass http://website-backend:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Grafana en subpath bfmu.dev/grafana
    # ^~ evita que la regex de estáticos capture /grafana/public/build/*.js
    location ^~ /grafana/ {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $grafana_forwarded_proto;
        proxy_pass http://website-grafana:3000/grafana/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
    location = /grafana {
        return 302 /grafana/;
    }

    # Proxy para /uploads (imágenes y medios del backend)
    # ^~ evita que la regex de estáticos capture /uploads/*.jpg|png| etc.
    location ^~ /uploads/ {
        proxy_pass http://website-backend:3000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy para frontend (Astro escucha en 4321)
    location / {
        proxy_pass http://website-frontend:4321;
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Cache para estáticos del frontend
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp)$ {
        proxy_pass http://website-frontend:4321;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
