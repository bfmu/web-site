services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: website-backend
    expose:
      - 3000
    networks:
      - red_internal
    env_file:
      - ./.env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
    container_name: website-frontend
    ports:
      - "82:80" 
    expose:
      - 8080  # Cambiado de 80 a 8080 (puerto interno)
    networks:
      - red_internal
    env_file:
      - ./.env
    environment:
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL}
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    container_name: website-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "81:81"  # Acceso externo al proxy
    depends_on:
      - frontend
      - backend
    networks:
      - red_internal

networks:
  red_internal: