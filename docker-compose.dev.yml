services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: website-mongodb-dev
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: blog
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - website-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Backend (NestJS)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile-dev
    container_name: website-backend-dev
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads
      - ./backend/package.json:/app/package.json
      - ./backend/package-lock.json:/app/package-lock.json
      - ./backend/tsconfig.json:/app/tsconfig.json
      - ./backend/nest-cli.json:/app/nest-cli.json
      - /app/node_modules
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=development
      - MONGODB_URI=mongodb://admin:admin123@mongodb:27017/blog?authSource=admin
      - PORT=3000
    networks:
      - website-network
    depends_on:
      mongodb:
        condition: service_healthy
    command: npm run start:dev

  # Frontend (Astro)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile-dev
    container_name: website-frontend-dev
    ports:
      - "4321:4321"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/package.json:/app/package.json
      - ./frontend/astro.config.mjs:/app/astro.config.mjs
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - /app/node_modules
    env_file:
      - ./frontend/.env
    environment:
      - NODE_ENV=development
      - PUBLIC_BACKEND_URL=http://localhost:3000/
      - PUBLIC_BACKEND_URL_SSR=http://backend:3000/
      - PUBLIC_WEB_SITE_URL=http://localhost:4321/
    networks:
      - website-network
    depends_on:
      - backend
    command: pnpm run dev

  # Logging stack: Loki, Promtail, Grafana
  loki:
    image: grafana/loki:3.6.0
    container_name: website-loki-dev
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/config.yaml:ro
    command: -config.file=/etc/loki/config.yaml
    networks:
      - website-network

  promtail:
    image: grafana/promtail:3.6.0
    container_name: website-promtail-dev
    volumes:
      - ./monitoring/promtail-config.yaml:/etc/promtail/config.yaml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yaml
    depends_on:
      - loki
    networks:
      - website-network

  grafana:
    image: grafana/grafana:latest
    container_name: website-grafana-dev
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana-datasource.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
    depends_on:
      - loki
    networks:
      - website-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local

networks:
  website-network:
    driver: bridge

